# Remove default prefix entirely
unbind C-b
set -g prefix None
# Mouse
set -g mouse on
# Faster responsiveness
set -sg escape-time 0
# True color
# set -g default-terminal "screen-256color"
# set -as terminal-features ",xterm-256color:RGB"
# Pane navigation (Hyprland style)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# Resize panes
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5
# Split panes
bind -n M-Enter split-window -h      # left/right
bind -n M-S-Enter split-window -v   # top/bottom
# Tabs/windows
bind -n M-t new-window
bind -n M-q kill-pane
# Switch tabs
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# Next/prev tab
bind -n M-n next-window
bind -n M-p previous-window
# Reload config
bind -n M-r source-file ~/.tmux.conf \; display "Reloaded!"

# Status bar on top
set -g status-position top

# Status bar styling
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Window tabs
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g window-status-style "bg=#313244,fg=#cdd6f4"
set -g window-status-separator ""
set -gw pane-border-style "fg=#1e1e2e"

# Left/right status
set -g status-left ""
set -g status-right "#[bg=#313244,fg=#cdd6f4] %H:%M "
set -g status-left-length 20
set -g status-right-length 20

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


# Mouse: middle-click tab to close
bind -n MouseDown2Status kill-window

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
